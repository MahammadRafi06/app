version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: connectk-postgres
    environment:
      POSTGRES_USER: connectk
      POSTGRES_PASSWORD: connectk
      POSTGRES_DB: connectk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectk"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: connectk-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: connectk-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://connectk:connectk@postgres:5432/connectk
      DATABASE_SYNC_URL: postgresql://connectk:connectk@postgres:5432/connectk
      REDIS_URL: redis://redis:6379/0
      CONNECTK_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: connectk-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
